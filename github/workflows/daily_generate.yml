name: Daily AI Music Generation

on:
  schedule:
    - cron: '0 22 * * *' # 日本時間午前7時 (UTC 22:00)
  workflow_dispatch: # 手動実行用

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 librosa numpy

      - name: Run generation system
        env:
          SUNO_COOKIE: ${{ secrets.SUNO_COOKIE }}
        run: |
          python main_system.py

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "【AI音楽生成】本日の生成レポート (${{ github.event.repository.updated_at }})"
          to: hoshininegaiwo.ppp@gmail.com
          from: "AI Music Bot <${{ secrets.MAIL_USERNAME }}>"
          body: file://daily_report.md
          convert_markdown: true

      - name: Commit and push changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated songs and updated learning data [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin main

      - name: Clean up old songs (older than 1 day)
        if: success()
        run: |
          find generated_songs/ -name "*.mp3" -mtime +1 -delete || echo "No files to delete"
          git add .
          git commit -m "Clean up old songs" || echo "No old songs to delete"
          git push origin main
